#
# Date          Owner                   Change description
# 23-Mar-2026   Karthikeyan Annamalai   Build and push an image to Azure Container Registry
#

trigger:
- dev

name: $(Date:yyyyMMdd)$(Rev:.r)

resources:
- repo: self

variables:
  imageName: 'compass-frontend'

  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'b68f23af-7325-4efc-8ebd-8dd5f73f4880'
  imageRepository: 'compass-frontend'
  containerRegistry: 'tmtacr01-bwfcbshhgadta8cy.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push compass-frontend stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an compass-frontend image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(Build.BuildNumber)
          latest

- stage: DeployToAKS
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: KubernetesManifest@1
      inputs:
        action: deploy
        kubernetesServiceConnection: '8987627f-e3ee-4dea-9fd3-87572151f4eb'
        namespace: default
        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml
        containers: |
          'tmtacr01-bwfcbshhgadta8cy.azurecr.io/compass-frontend:latest':$(Build.BuildNumber)
